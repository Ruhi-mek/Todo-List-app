<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

</head>
<body>
    <div class="continer">
        <!-- login screen -->
        <div class="firstscreen" id = "login-screen">
            <div class="card">
                <div class="greeting">
                    <h1 class="title">Welcome</h1>
                    <span class="subtitle">This is your smart Todo List App! stay organized, focusde, and in control of your day.❤️</span>
                </div>
                <div class="login">
                    <div class="form">
                        <label for="name">Username:</label>
                        <input type="text" id="login-name" name="name" placeholder="Enter your name" required>
                        <label for="password">Password:</label>
                        <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="login-btn">
                        <button class="btn-in" id="login-to-main">Log in</button>
                        <button class="btn-back" id="clean-info">Clean</button>
                    </div>
                    <div class="new">
                        <div class="divider">
                            <span>New to our app?</span>
                        </div>
                        <button class="btn-sin" id="go-to-signup">Sign Up</button>
                    </div>    
                </div>   
            </div>
        </div>
        
        <!-- signup screen -->
        <div class="secondscreen" id = "signup-screen">
            <div class="card">
                <div class="greeting">
                    <h1 class="title">Welcome</h1>
                    <span class="subtitle">This is your smart Todo List App! stay organized, focusde, and in control of your day.❤️</span>
                </div>
                <div class="signup">
                    <div class="form">
                        <label for="name">Username:</label>
                        <input type="text" id="signup-name" name="name" placeholder="Enter your name" required>
                        <label for="email">Email:</label>
                        <input type="email" id="signup-email" name="email" placeholder="example@gamil.com" required>
                        <label for="password">Password:</label>
                        <input type="password" id="signup-password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="signup-btn">
                        <button class="btn-in" id="signup-to-main">Sign Up</button>
                        <button class="btn-back" id="back-to-login">Back</button>
                    </div>
                </div>
            </div>    
        </div>
        
        <!-- main screen -->
        <div class="mainscreen" id = "main-screen">
             <header>
                <h1>📝 Advanced Todo List</h1>
            </header>

            <div class="input-section">
                <input type="text" id="todoInput" placeholder="Add new todo (title, description, due date, priority)">
                <input type="text" id="descriptionInput" placeholder="Description">
                <input type="date" id="dueDateInput">
                <select id="prioritySelect">
                    <option value="low">Low Priority</option>
                    <option value="medium" selected>Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <button id="addBtn">Add Todo</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="todoList" class="todo-list"></ul>
        </div>
        
    </div>
</body>
</html>
